name: Check Firmware Version Change

on:
  pull_request:
    branches:
      - main

jobs:
  check-version-change:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Get values from main (base branch)
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}

          MAIN_FIRMWARE_VERSION=$(git show $BASE_SHA:settings.conf | grep "^FIRMWARE_VERSION=" | cut -d '=' -f 2)
          MAIN_VERSION=$(git show $BASE_SHA:settings.conf | grep "^VERSION=" | cut -d '=' -f 2)

          echo "main_firmware_version=$MAIN_FIRMWARE_VERSION" >> $GITHUB_ENV
          echo "main_version=$MAIN_VERSION" >> $GITHUB_ENV

      - name: Get values from PR branch
        run: |
          DEV_FIRMWARE_VERSION=$(grep "^FIRMWARE_VERSION=" settings.conf | cut -d '=' -f 2)
          DEV_VERSION=$(grep "^VERSION=" settings.conf | cut -d '=' -f 2)

          echo "dev_firmware_version=$DEV_FIRMWARE_VERSION" >> $GITHUB_ENV
          echo "dev_version=$DEV_VERSION" >> $GITHUB_ENV

      - name: Compare
        run: |
          echo "Main firmware: $main_firmware_version"
          echo "Dev firmware: $dev_firmware_version"
          echo "Main version: $main_version"
          echo "Dev version: $dev_version"

          if [[ "$main_firmware_version" == "$dev_firmware_version" ]] || [[ "$main_version" == "$dev_version" ]]; then
            echo "Error: FIRMWARE_VERSION or VERSION have not changed."
            exit 1
          else
            echo "Success: Version has changed."
          fi
